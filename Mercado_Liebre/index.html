    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              bg: 'var(--bg-color)',
              surface: 'var(--surface-color)',
              primary: 'var(--primary-color)',
              secondary: 'var(--secondary-color)',
              accent: 'var(--accent-color)',
              meli: {
                yellow: '#FFE600',
                blue: '#3483FA',
                dark: '#2D3277',
                light: '#EBEBEB'
              },
              text: {
                main: 'var(--text-main)',
                muted: 'var(--text-muted)'
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* --- MODE CLARO: ESTILO MERCADO LIBRE --- */
        --bg-color: #F5F5F7;
        --surface-color: #FFFFFF;
        --primary-color: #3483FA;   /* Azul oficial para botones */
        --secondary-color: #FFE600; /* Amarillo oficial para cabecera */
        --accent-color: #2D3277;    /* Azul oscuro para títulos */
        
        --text-main: #333333; 
        --text-muted: #666666; 
        
        --border-color: #E6E6E6;
        --border: 1px solid var(--border-color);
        
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      .dark {
        /* --- MODO OSCURO: TONOS AMARILLOS/ÁMBAR (SIN AZUL) --- */
        --bg-color: #0F0F0F; 
        --surface-color: #1A1A1A;
        --primary-color: #FFE600;   /* Amarillo meli */
        --secondary-color: #FFC000;
        --accent-color: #FFB000;
        
        --text-main: #F5F5F5; 
        --text-muted: #A0A0A0; 
        
        --border-color: #333333;
        --border: 1px solid var(--border-color);
        
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
      }
      
      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s ease;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* --- CLASES DE UTILIDAD --- */
      .border-border { border-color: var(--border-color); }
      .bg-bg { background-color: var(--bg-color); }
      .bg-surface { background-color: var(--surface-color); }
      .text-text-main { color: var(--text-main); }
      .text-text-muted { color: var(--text-muted); }
      
      .btn-primary {
        background-color: var(--primary-color) !important;
        color: #FFFFFF !important;
        transition: opacity 0.2s ease;
      }
      .btn-primary:hover { opacity: 0.9; }
      
      .dark .btn-primary {
        color: #000000 !important;
      }
      
      .btn-secondary {
        background-color: rgba(52, 131, 250, 0.1) !important;
        color: var(--primary-color) !important;
        transition: background-color 0.2s ease;
      }
      .btn-secondary:hover { background-color: rgba(52, 131, 250, 0.15) !important; }
      
      .dark .btn-secondary {
        background-color: rgba(255, 230, 0, 0.1) !important;
        color: #FFE600 !important;
      }
      .dark .btn-secondary:hover { background-color: rgba(255, 230, 0, 0.15) !important; }

      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: var(--bg-color); }
      ::-webkit-scrollbar-thumb { background-color: var(--shadow-dark); border-radius: 10px; border: 3px solid var(--bg-color); }
      
      @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fadeIn { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
      @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      .animate-slideIn { animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
      @keyframes flipIn { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0); opacity: 1; } }
      .animate-flipIn { animation: flipIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    </style>

</script>
