# API Gateway — punto único de entrada al backend (microservicios).
# Enruta por prefijo manteniendo las rutas /api/* que usa el frontend.

upstream usuarios_upstream {
    server usuarios-service:3001;
}

upstream tiendas_upstream {
    server tiendas-service:3002;
}

upstream catalogo_upstream {
    server catalogo-service:3003;
}

upstream media_upstream {
    server media-service:3004;
}

upstream categorias_upstream {
    server categorias-service:3005;
}

upstream ia_upstream {
    server ia-service:3006;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 8M;

    # Health del gateway (sin proxy)
    location = /api/health {
        default_type application/json;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","gateway":"mercadoliebre","routing":["usuarios-service","tiendas-service","catalogo-service","media-service","categorias-service","ia-service"]}';
    }

    # Health agregado por servicio: /api/health/<servicio>
    # Permite consultar desde el frontend / Postman el estado de cada microservicio
    # (DB ping + estado de cada circuit breaker) sin acceder a los puertos internos.
    location = /api/health/usuarios {
        proxy_pass http://usuarios_upstream/api/health;
        include /etc/nginx/snippets/proxy-api.conf;
    }
    location = /api/health/tiendas {
        proxy_pass http://tiendas_upstream/api/health;
        include /etc/nginx/snippets/proxy-api.conf;
    }
    location = /api/health/catalogo {
        proxy_pass http://catalogo_upstream/api/health;
        include /etc/nginx/snippets/proxy-api.conf;
    }
    location = /api/health/media {
        proxy_pass http://media_upstream/api/health;
        include /etc/nginx/snippets/proxy-api.conf;
    }
    location = /api/health/categorias {
        proxy_pass http://categorias_upstream/api/health;
        include /etc/nginx/snippets/proxy-api.conf;
    }
    location = /api/health/ia {
        proxy_pass http://ia_upstream/api/health;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    # Estado de circuit breakers (solo lectura, útil para observabilidad/demo).
    location = /api/health/breakers/tiendas {
        proxy_pass http://tiendas_upstream/api/health/breakers;
        include /etc/nginx/snippets/proxy-api.conf;
    }
    location = /api/health/breakers/catalogo {
        proxy_pass http://catalogo_upstream/api/health/breakers;
        include /etc/nginx/snippets/proxy-api.conf;
    }
    location = /api/health/breakers/categorias {
        proxy_pass http://categorias_upstream/api/health/breakers;
        include /etc/nginx/snippets/proxy-api.conf;
    }
    location = /api/health/breakers/ia {
        proxy_pass http://ia_upstream/api/health/breakers;
        include /etc/nginx/snippets/proxy-api.conf;
    }
    location = /api/health/breakers/usuarios {
        proxy_pass http://usuarios_upstream/api/health/breakers;
        include /etc/nginx/snippets/proxy-api.conf;
    }
    location = /api/health/breakers/media {
        proxy_pass http://media_upstream/api/health/breakers;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    # --- Auth / usuarios ---
    location /api/auth/ {
        proxy_pass http://usuarios_upstream/api/auth/;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    location = /api/registro {
        proxy_pass http://usuarios_upstream/api/registro;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    location = /api/login {
        proxy_pass http://usuarios_upstream/api/login;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    # --- Media ---
    location /api/media/ {
        proxy_pass http://media_upstream/api/media/;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    # --- Categorías ---
    location /api/categorias {
        proxy_pass http://categorias_upstream;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    # --- IA ---
    location /api/ia/ {
        proxy_pass http://ia_upstream/api/ia/;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    # --- Catálogo (productos) ---
    location /api/productos {
        proxy_pass http://catalogo_upstream;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    # --- Tiendas y temas ---
    location /api/temas {
        proxy_pass http://tiendas_upstream;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    location /api/tiendas {
        proxy_pass http://tiendas_upstream;
        include /etc/nginx/snippets/proxy-api.conf;
    }

    location / {
        return 404;
    }
}
