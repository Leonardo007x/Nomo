services:
  backend:
    build:
      dockerfile: backend/Dockerfile
    ports:
      - "5002:5000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql

  usuarios:
    build: ./usuarios
    ports:
      - "5001:5000"

  gateway:
    build: ./gateway
    ports:
      - "5000:5000"
    depends_on:
      - backend
      - usuarios

volumes:
  db_data: