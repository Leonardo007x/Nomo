version: '3.8'

services:

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=pixelrank_user
      - MYSQL_PASSWORD=pixelrank_pass
      - MYSQL_DATABASE=pixelrank_db
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=root_secret
      - MYSQL_DATABASE=pixelrank_db
      - MYSQL_USER=pixelrank_user
      - MYSQL_PASSWORD=pixelrank_pass
    ports:
      - "3306:3306"
    volumes:
      - pixelrank_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pixelrank_data:
