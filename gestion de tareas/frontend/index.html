<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Tareas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #b6e3bf;
            /* Fondo verde muy suave */
            color: #2c4c3b;
            /* Texto oscuro con tono verde */
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #1e5631;
            /* Verde oscuro para el título principal */
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        h2 {
            color: #387c53;
            /* Verde medio para subtítulos */
            border-bottom: 2px solid #a3d9b1;
            padding-bottom: 8px;
        }

        .status {
            background-color: #d4edda;
            /* Verde claro panel conexión */
            border-left: 5px solid #28a745;
            /* Verde llamativo éxito */
            color: #155724;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 6px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .task-list {
            list-style: none;
            padding: 0;
        }

        .task-list li {
            background: #ffffff;
            margin-bottom: 15px;
            padding: 18px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(40, 167, 69, 0.08);
            /* Sombra con un tinte verdoso */
            border-left: 4px solid #8fce00;
            /* Borde izquierdo verde lima suave */
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .task-list li:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(40, 167, 69, 0.12);
        }

        .completed {
            color: #27ae60;
            background-color: #e8f8f5;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .pending {
            color: #d35400;
            /* Naranja/terracota terroso para combinar con el verde */
            background-color: #fbeee6;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <h1>Sistema de Gestión de Tareas</h1>

    <div id="api-status" class="status">
        Comprobando conexión con la API...
    </div>

    <h2>Mis Tareas</h2>
    <ul id="tasks-container" class="task-list">
        <li>Cargando tareas...</li>
    </ul>

    <script>
        // La URL del backend expuesta en el puerto 3000 hacia el localhost
        const apiUrl = 'http://localhost:3000';

        // 1. Consumir endpoint raíz '/' para verificar si funciona la API
        fetch(`${apiUrl}/`)
            .then(response => response.text())
            .then(data => {
                document.getElementById('api-status').innerText = `Mensaje del Servidor: ${data}`;
            })
            .catch(error => {
                document.getElementById('api-status').innerText = 'Error: No se pudo conectar al Backend.';
                document.getElementById('api-status').style.borderLeftColor = '#e74c3c';
                document.getElementById('api-status').style.backgroundColor = '#fadbd8';
                console.error('Error fetching API status:', error);
            });

        // 2. Consumir endpoint '/tasks' para cargar la lista de tareas
        fetch(`${apiUrl}/tasks`)
            .then(response => response.json())
            .then(tasks => {
                const container = document.getElementById('tasks-container');
                container.innerHTML = ''; // Limpiamos el mensaje de "Cargando..."

                tasks.forEach(task => {
                    const li = document.createElement('li');

                    const spanTitle = document.createElement('span');
                    spanTitle.innerText = task.title;

                    const spanStatus = document.createElement('span');
                    spanStatus.innerText = task.completed ? 'Completada ✔' : 'Pendiente ⏳';
                    spanStatus.className = task.completed ? 'completed' : 'pending';

                    li.appendChild(spanTitle);
                    li.appendChild(spanStatus);
                    container.appendChild(li);
                });
            })
            .catch(error => {
                const container = document.getElementById('tasks-container');
                container.innerHTML = '<li>Error al cargar las tareas.</li>';
                console.error('Error fetching tasks API:', error);
            });
    </script>
</body>

</html>
